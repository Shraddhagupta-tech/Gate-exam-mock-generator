subject: Computer Networks
exam: GATE CSE
subject_weightage: 15

topics:

  - name: Physical Layer
    topic_code: CN_PHY
    weightage: 10
    gate_frequency: high

    subtopics:

      - name: Transmission Media
        concepts:
          - concept_code: CN_PHY_01
            name: Transmission Media and Bandwidth Characteristics
            weightage: 4
            gate_frequency: high
            question_types:
              MCQ: 70
              MSQ: 10
              NAT: 20
            difficulty_distribution:
              easy: 40
              medium: 40
              hard: 20
            estimated_questions_per_year: 1
            prerequisites: []
            learning_outcomes:
              - compare_transmission_media
              - evaluate_bandwidth_limits
              - analyze_attenuation
